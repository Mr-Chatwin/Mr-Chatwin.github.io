<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFTC 持仓报告</title>
<style>
/* ─── 主题变量 ─── */
:root {
  --bg-primary:#FAF8F4; --bg-secondary:#F5F3F0; --bg-white:#FFFFFF;
  --text-primary:#000000; --text-secondary:#333; --text-tertiary:#555; --text-muted:#777;
  --accent-primary:#D97149; --accent-hover:#C45A33; --accent-light:#FFF4F0; --accent-lighter:#FFF9F7;
  --border-light:#F0EDE9; --border-medium:#E8E5E1; --border-dark:#DDD9D4;
  --green-text:#006100; --green-bg:#E8F5E9; --red-text:#9C0006; --red-bg:#FFEBEE;
  --yellow-bg:#FFF8E1; --yellow-border:#FFCA28; --amber-600:#D97706;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1C1917; --bg-secondary:#292524; --bg-white:#292524;
    --text-primary:#FAFAF9; --text-secondary:#E7E5E4; --text-tertiary:#D6D3D1; --text-muted:#A8A29E;
    --accent-light:#3D2A22; --accent-lighter:#2C2018;
    --border-light:#3F3A36; --border-medium:#57534E; --border-dark:#78716C;
    --green-text:#66BB6A; --green-bg:#1B3A1B; --red-text:#EF5350; --red-bg:#3A1B1B;
    --yellow-bg:#4A3D10; --yellow-border:#D4A72C; --amber-600:#D4A72C;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg-primary);color:var(--text-secondary);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;font-feature-settings:'cv01','cv09',ss01;font-size:13px
}
/* ─── 布局 ─── */
.wrap{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:220px;flex-shrink:0;background:var(--bg-white);overflow-y:auto;
  border-right:1px solid var(--border-light);display:flex;flex-direction:column
}
.sidebar-head{padding:16px 16px 12px}
.sidebar-head h1{font-size:15px;font-weight:600;color:var(--text-primary);font-family:'Times New Roman','SimSun','宋体',serif}
.sidebar-head p{font-size:11px;color:var(--text-muted);margin-top:2px}
.sidebar-nav{padding:0 10px 16px;flex:1}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:0 6px 8px}
.sidebar-btn{
  display:block;width:100%;text-align:left;padding:6px 10px;font-size:13px;border-radius:6px;
  border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s;
  margin-bottom:2px
}
.sidebar-btn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.sidebar-btn.active{background:var(--accent-light);color:var(--accent-primary);font-weight:600}
.sidebar-mobile-toggle{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{
  padding:12px 20px;border-bottom:1px solid var(--border-medium);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:var(--bg-primary);position:sticky;top:0;z-index:10
}
.main-body{flex:1;overflow-y:auto;padding:16px 20px 40px}
/* ─── Tabs ─── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border-light);margin-bottom:16px}
.tab{
  padding:8px 16px;cursor:pointer;color:var(--text-muted);font-size:13px;font-weight:500;
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s
}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--accent-primary);border-bottom-color:var(--accent-primary)}
.panel{display:none}
.panel.active{display:block}
/* ─── 表格 ─── */
.table-wrap{overflow-x:auto;border:1px solid var(--border-light);border-radius:8px;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:var(--bg-secondary);color:var(--text-tertiary);font-size:10px;padding:8px 6px;
  text-align:right;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);
  white-space:nowrap;font-weight:600
}
thead th:first-child{text-align:left;border-right-color:var(--border-light)}
thead th.sub{font-size:9px;color:var(--text-muted);font-weight:500}
tbody td{padding:6px;text-align:right;border-bottom:1px solid var(--border-light);white-space:nowrap;font-size:11px}
tbody tr:hover{background:var(--bg-secondary)}
tbody tr:nth-child(even):not(.section-row){background:color-mix(in srgb,var(--bg-secondary) 30%,transparent)}
.section-row td{background:color-mix(in srgb,var(--bg-secondary) 60%,transparent);color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:4px 12px;text-align:left}
.green{color:var(--green-text)}.red{color:var(--red-text)}.muted{color:var(--text-muted)}
.td-center{text-align:center}
/* 价格背离高亮 */
.price-divergence{background:var(--yellow-bg)!important;border-left:2px solid var(--yellow-border)}
/* z-score 柱状图 */
.zbar{display:inline-block;min-width:48px;text-align:center;position:relative;padding:6px 6px}
.zbar-bg{position:absolute;top:1px;bottom:1px;opacity:.18}
.zbar-bg.pos{left:50%;background:var(--green-text)}
.zbar-bg.neg{right:50%;background:var(--red-text)}
.zbar span{position:relative;z-index:1;font-size:11px;font-weight:500;display:block;padding:1px 0}
/* 动作标签 */
.flow-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;white-space:nowrap}
.flow-tag.long{background:var(--green-bg);color:var(--green-text)}
.flow-tag.short{background:var(--red-bg);color:var(--red-text)}
.flow-tag.neutral{background:var(--bg-secondary);color:var(--text-muted)}
.flow-tag.warn{background:var(--yellow-bg);color:var(--amber-600)}
/* 拥挤度标签 */
.crowd-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;white-space:nowrap}
.crowd-tag.extreme{background:color-mix(in srgb,var(--red-text) 10%,transparent);color:var(--red-text);border:1px solid color-mix(in srgb,var(--red-text) 20%,transparent)}
.crowd-tag.moderate{background:var(--accent-lighter);color:var(--accent-primary);border:1px solid color-mix(in srgb,var(--accent-primary) 20%,transparent)}
/* ─── Dashboard ─── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
@media(min-width:640px){.summary-grid{grid-template-columns:repeat(4,1fr);gap:12px}}
.summary-card{background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;padding:12px}
.summary-card.col-2{grid-column:span 2}
.summary-card h4{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.summary-card .big{font-size:20px;font-weight:700;color:var(--text-primary)}
.summary-card .small{font-size:11px;color:var(--text-muted);margin-top:2px}
.mood-dots{display:flex;gap:10px;margin-top:6px}
.mood-dots span{display:flex;align-items:center;gap:4px;font-size:13px}
.mood-dots .dot{width:7px;height:7px;border-radius:50%}
.mood-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:6px;background:var(--bg-secondary)}
.market-section{margin-bottom:16px}
.market-section h3{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:768px){.card-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.card-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1280px){.card-grid{grid-template-columns:repeat(5,1fr)}}
.instr-card{
  background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;padding:12px;
  display:flex;flex-direction:column
}
.instr-card.crowded{border-color:color-mix(in srgb,var(--accent-primary) 40%,transparent)}
.instr-card.diverged{border-color:color-mix(in srgb,var(--amber-600) 50%,transparent)}
.instr-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.instr-card .name{font-size:14px;font-weight:600;color:var(--text-primary)}
.instr-card .sentiment{font-size:12px;font-weight:600}
.instr-card .price{font-size:15px;font-weight:700}
/* 持仓指示器 */
.gauge{display:flex;align-items:center;gap:6px;margin-top:4px}
.gauge label{font-size:10px;color:var(--text-muted);width:52px;flex-shrink:0}
.gauge-track{flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;position:relative;overflow:hidden}
.gauge-bg{position:absolute;inset:0;border-radius:4px;background:linear-gradient(to right,var(--red-text),var(--border-medium) 40%,var(--border-medium) 60%,var(--green-text));opacity:.15}
.gauge-center{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--border-dark)}
.gauge-dot{
  position:absolute;top:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg-white);box-shadow:0 1px 2px rgba(0,0,0,.15)
}
.gauge-val{font-size:10px;font-weight:600;width:30px;text-align:right}
.insight{font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:6px}
.card-tags .tag{font-size:10px;font-weight:500;padding:1px 5px;border-radius:3px}
.card-tags .tag.bull{background:var(--green-bg);color:var(--green-text)}
.card-tags .tag.bear{background:var(--red-bg);color:var(--red-text)}
.card-tags .tag.crowd{background:var(--accent-lighter);color:var(--accent-primary);border:1px solid color-mix(in srgb,var(--accent-primary) 20%,transparent)}
.card-tags .tag.diverge{background:var(--yellow-bg);color:var(--amber-600);border:1px solid color-mix(in srgb,var(--amber-600) 30%,transparent)}
.card-tags .tag.neutral{background:var(--bg-secondary);color:var(--text-muted)}
/* ─── AI 分析 ─── */
.analysis-wrap{padding-bottom:20px}
.analysis-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.analysis-header h1{font-size:18px;font-weight:700;color:var(--text-primary);font-family:'Times New Roman','SimSun','宋体',serif}
.analysis-header .meta{display:flex;align-items:center;gap:8px;margin-top:4px}
.analysis-header .meta span{font-size:12px;color:var(--text-muted)}
.analysis-header .badge{font-size:10px;background:var(--bg-secondary);color:var(--text-muted);padding:1px 6px;border-radius:3px;font-weight:500}
.analysis-legend{display:flex;gap:10px;font-size:10px}
.analysis-legend .lg{font-weight:600}
.analysis-legend .lg.bull{color:var(--green-text)}
.analysis-legend .lg.bear{color:var(--red-text)}
.analysis-legend .lg.risk{color:var(--accent-primary)}
.analysis-content{border-top:1px solid var(--border-light);padding-top:16px;columns:1;gap:24px}
@media(min-width:768px){.analysis-content{columns:2}}
.analysis-content h3{
  font-size:16px;font-weight:600;color:var(--text-primary);
  margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border-light)
}
.analysis-content h4{font-size:12px;font-weight:600;color:var(--accent-primary);text-transform:uppercase;letter-spacing:.03em;margin:16px 0 4px}
.analysis-content p{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-bottom:6px;break-inside:avoid}
.analysis-content ul{margin-bottom:12px;break-inside:avoid;padding-left:0;list-style:none}
.analysis-content li{font-size:14px;line-height:1.6;color:var(--text-secondary);display:flex;gap:6px;margin-bottom:2px}
.analysis-content li::before{content:"•";color:var(--accent-primary);flex-shrink:0}
.analysis-content strong{font-weight:600;color:var(--text-primary)}
.analysis-content .key-bull{color:var(--green-text);font-weight:600}
.analysis-content .key-bear{color:var(--red-text);font-weight:600}
.analysis-content .key-risk{color:var(--accent-primary);font-weight:600}
.analysis-content .key-z{font-family:'SF Mono',Monaco,'Cascadia Code',Consolas,monospace;font-weight:600;color:var(--text-primary);background:var(--bg-secondary);padding:0 3px;border-radius:2px}
/* ─── 加载/错误 ─── */
.loading,.error,.empty{padding:60px 20px;text-align:center;color:var(--text-muted)}
.error{color:var(--red-text)}
/* ─── Overlay ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:30}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .overlay.show{display:block}
  .sidebar-mobile-toggle{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--text-primary);cursor:pointer;font-size:13px;padding:4px 0}
}
/* ─── source link ─── */
.source-link{text-align:center;padding:20px;color:var(--text-muted);font-size:11px;border-top:1px solid var(--border-light);margin-top:16px}
.source-link a{color:var(--accent-primary);text-decoration:none}
.source-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <!-- Overlay for mobile -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h1>CFTC Report</h1>
      <p>Commitments of Traders</p>
    </div>
    <div class="sidebar-nav">
      <p class="sidebar-label">历史报告</p>
      <div id="dateList"></div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <div class="main-header">
      <button class="sidebar-mobile-toggle" id="menuBtn">☰ 菜单</button>
      <div id="currentDateDisplay" style="font-size:13px;font-weight:500;color:var(--text-primary)"></div>
      <div></div>
    </div>
    <div class="main-body" id="mainBody">
      <div class="loading" id="loading"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="31.4" stroke-dashoffset="10" style="animation:spin 1s linear infinite"/></svg><p style="margin-top:8px">正在加载报告...</p></div>
      <div class="error" id="error" style="display:none"></div>
      <div id="content" style="display:none">
        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="table">Table</button>
          <button class="tab" data-tab="report">Report</button>
          <button class="tab" data-tab="analysis">Analysis</button>
        </div>
        <div class="panel active" id="panel-table"></div>
        <div class="panel" id="panel-report"></div>
        <div class="panel" id="panel-analysis"></div>
      </div>
      <div class="source-link" id="footer" style="display:none">
        数据来源: CFTC · <a href="https://github.com/Mr-Chatwin/cft.report">GitHub 源码</a>
      </div>
    </div>
  </div>
</div>
<style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>

<script>
// ─── 配置 ───
const BASE = window.location.origin + window.location.pathname.replace(/\/$/,'') || 'https://mr-chatwin.github.io/cft.report';
const BULL = new Set(['多头建仓','空头回补','多头挤压']);
const BEAR = new Set(['空头建仓','多头平仓','空头施压']);
const KEYWORDS = [
  {p:/(多头建仓|多头挤压|空头回补|看多|做多|抄底|反弹|上涨|偏多|牛市|risk-on|买入)/gi,c:'key-bull'},
  {p:/(空头建仓|空头施压|多头平仓|看空|做空|抛售|下跌|偏空|熊市|risk-off|卖出)/gi,c:'key-bear'},
  {p:/(极端|拥挤|反转风险|背离|警惕|风险|过度|泡沫|恐慌)/gi,c:'key-risk'},
  {p:/(z[=＝]?[-−]?\d+\.?\d*|[-−]?\d+\.?\d*[σz]|z-score\s*[-−]?\d+\.?\d*)/gi,c:'key-z'},
];

let report = null, dates = [], md = null;

// ─── 初始化 ───
async function init() {
  try {
    // Load index
    const r1 = await fetch(BASE + '/data/index.json');
    if(r1.ok) { const d=await r1.json(); dates=d.dates.sort().reverse(); }
    if(!dates.length) dates=['2026-05-05','2026-04-28','2026-04-21','2026-04-07','2026-03-24','2026-03-10','2026-03-03'];
    renderDateList();
    // Load latest report
    await loadReport(dates[0]);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent='加载失败: '+e.message;
  }
}

function renderDateList(){
  const el=document.getElementById('dateList');
  el.innerHTML='';
  dates.forEach(d=>{
    const b=document.createElement('button');
    b.className='sidebar-btn'+(d===dates[0]?' active':'');
    b.textContent=d+' '+new Date(d+'T00:00:00').toLocaleDateString('zh-CN',{weekday:'short'});
    b.dataset.date=d;
    b.onclick=()=>{
      document.querySelectorAll('.sidebar-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      loadReport(d);
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    };
    el.appendChild(b);
  });
}

// ─── 加载报告 ───
async function loadReport(date){
  document.getElementById('loading').style.display='block';
  document.getElementById('content').style.display='none';
  document.getElementById('error').style.display='none';
  document.getElementById('footer').style.display='none';
  document.getElementById('currentDateDisplay').textContent='📅 '+date;

  try {
    const r=await fetch(BASE+'/data/'+date+'.json');
    if(!r.ok) throw new Error('HTTP '+r.status);
    report=await r.json();
    renderAll();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('footer').style.display='block';
  } catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent='加载报告失败: '+e.message;
  }
}

function renderAll(){
  renderTable(report);
  renderDashboard(report);
  renderAnalysis(report);
}

// ─── 表格 ───
function renderTable(d){
  const el=document.getElementById('panel-table');
  el.innerHTML='<p style="font-size:11px;color:var(--text-muted);margin-bottom:12px">报告日期: '+d.report_date+' · 杠杆基金 '+d.tff_rows.length+' 项 · 管理资金 '+d.disagg_rows.length+' 项</p>';
  el.innerHTML+=buildTable('杠杆基金 Leveraged Funds (TFF)',d.tff_rows);
  el.innerHTML+=buildTable('管理资金 Managed Money (Disagg)',d.disagg_rows);
}

function buildTable(title,rows){
  if(!rows.length) return '<p class="section-title">'+title+'</p><p class="muted">无数据</p>';
  let h='<p style="font-size:14px;font-weight:600;color:var(--text-primary);margin:24px 0 4px">'+title+'</p><div class="table-wrap"><table><thead>';
  h+='<tr><th rowspan="2" style="text-align:left;min-width:80px">资产</th><th rowspan="2">同期涨跌</th>';
  h+='<th colspan="3" style="border-bottom:1px solid var(--border-light)">净持仓</th>';
  h+='<th colspan="3" style="border-bottom:1px solid var(--border-light)">多头</th>';
  h+='<th colspan="3" style="border-bottom:1px solid var(--border-light)">空头</th>';
  h+='<th rowspan="2">动作</th><th rowspan="2">拥挤度</th></tr><tr>';
  ['持仓','z','周变化','持仓','z','周变化','持仓','z','周变化'].forEach(x=>{h+='<th class="sub">'+x+'</th>'});
  h+='</tr></thead><tbody>';

  let last='';
  rows.forEach(r=>{
    if(r.section!==last){last=r.section;h+='<tr class="section-row"><td colspan="13">'+r.section+'</td></tr>'}
    const divergence = r.flow_state && r.price_chg!=null && (
      (BULL.has(r.flow_state) && r.price_chg < -0.05) || (BEAR.has(r.flow_state) && r.price_chg > 0.05)
    );
    const pCls = r.price_chg>0?'green':r.price_chg<0?'red':'muted';
    const pStr = r.price_chg!=null?(r.price_chg>0?'+':'')+r.price_chg.toFixed(1)+'%':'-';
    h+='<tr>';
    h+='<td style="text-align:left;font-weight:500;color:var(--text-primary)">'+r.instrument+'</td>';
    h+='<td class="'+pCls+(divergence?' price-divergence':'')+'">'+pStr+'</td>';
    h+=nCell(r.net)+zBar(r.net_z)+cCell(r.net_ww,r.net_ww_z);
    h+=nCell(r.long)+zBar(r.long_z)+cCell(r.long_ww,r.long_ww_z);
    h+=nCell(r.short)+zBar(r.short_z)+cCell(r.short_ww,r.short_ww_z);
    h+='<td class="td-center">'+flowTag(r.flow_state)+'</td>';
    h+='<td class="td-center">'+crowdTag(r.net_z,r.long_z,r.short_z)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function nCell(v){
  if(v==null) return '<td class="muted" style="text-align:right">-</td>';
  const c=v>0?'green':v<0?'red':'';
  return '<td class="'+c+'" style="text-align:right">'+v.toLocaleString()+'</td>';
}

function cCell(v,z){
  if(v==null) return '<td class="muted" style="text-align:right">-</td>';
  const c=v>0?'green':v<0?'red':'muted';
  const zs=z!=null?' ('+z.toFixed(1)+'z)':'';
  return '<td class="'+c+'" style="text-align:right">'+v.toLocaleString()+zs+'</td>';
}

function zBar(v){
  if(v==null) return '<td class="muted zbar" style="text-align:center">-</td>';
  const pct=Math.min(Math.abs(v)/3*50,50);
  const bg=v>0?'<div class="zbar-bg pos" style="width:'+pct+'%"></div>':v<0?'<div class="zbar-bg neg" style="width:'+pct+'%"></div>':'';
  const c=v>0?'green':v<0?'red':'muted';
  return '<td class="zbar" style="text-align:center">'+bg+'<span class="'+c+'">'+v.toFixed(1)+'</span></td>';
}

function flowTag(s){
  if(!s) return '<span class="flow-tag neutral">-</span>';
  const cls = BULL.has(s)?'long':BEAR.has(s)?'short':(s==='多空双增'||s==='多空双减')?'neutral':'warn';
  return '<span class="flow-tag '+cls+'">'+s+'</span>';
}

function crowdTag(nz,lz,sz){
  const n=nz??0, l=lz??0, s=sz??0;
  if(n>=2.75||l>=2.75) return '<span class="crowd-tag extreme">极端多头</span>';
  if(n<=-2.75||s>=2.75) return '<span class="crowd-tag extreme">极端空头</span>';
  if(n>=2||l>=2) return '<span class="crowd-tag moderate">拥挤多头</span>';
  if(n<=-2||s>=2) return '<span class="crowd-tag moderate">拥挤空头</span>';
  return '<span class="muted" style="font-size:10px">-</span>';
}

// ─── Dashboard ───
function renderDashboard(d){
  const el=document.getElementById('panel-report');
  const all=[...d.tff_rows,...d.disagg_rows];
  const bullCount=all.filter(r=>{const z=r.net_z??0;return (BULL.has(r.flow_state)||z>1)}).length;
  const bearCount=all.filter(r=>{const z=r.net_z??0;return (BEAR.has(r.flow_state)||z<-1)}).length;
  const neutralCount=all.length-bullCount-bearCount;
  const crowded=all.filter(r=>{const n=r.net_z??0,l=r.long_z??0,s=r.short_z??0;return n>=2||l>=2||n<=-2||s>=2});
  const diverged=all.filter(r=>r.flow_state&&r.price_chg!=null&&((BULL.has(r.flow_state)&&r.price_chg<-0.05)||(BEAR.has(r.flow_state)&&r.price_chg>0.05)));
  const overall=bullCount>bearCount+3?'整体偏多':bearCount>bullCount+3?'整体偏空':'多空均衡';

  let html='<div class="summary-grid">';
  html+=`<div class="summary-card col-2"><h4>市场情绪</h4><div class="big">${overall}</div>
    <div class="mood-dots"><span><span class="dot" style="background:var(--green-text)"></span>${bullCount} 看多</span>
    <span><span class="dot" style="background:var(--red-text)"></span>${bearCount} 看空</span>
    <span><span class="dot" style="background:var(--text-muted)"></span>${neutralCount} 中性</span></div>
    <div class="mood-bar"><div style="background:color-mix(in srgb,var(--green-text) 60%,transparent);width:${all.length?(bullCount/all.length*100):0}%"></div>
    <div style="background:color-mix(in srgb,var(--text-muted) 30%,transparent);width:${all.length?(neutralCount/all.length*100):0}%"></div>
    <div style="background:color-mix(in srgb,var(--red-text) 60%,transparent);width:${all.length?(bearCount/all.length*100):0}%"></div></div></div>`;
  html+=`<div class="summary-card"><h4>拥挤交易</h4><div class="big" style="color:var(--accent-primary)">${crowded.length}</div>
    <div class="small" title="${crowded.map(r=>r.instrument).join('、')}">${crowded.length?crowded.map(r=>r.instrument).join('、'):'无'}</div></div>`;
  html+=`<div class="summary-card"><h4>价格背离</h4><div class="big" style="color:var(--amber-600)">${diverged.length}</div>
    <div class="small" title="${diverged.map(r=>r.instrument).join('、')}">${diverged.length?diverged.map(r=>r.instrument).join('、'):'无'}</div></div></div>`;

  // Market groups
  const groups=[
    {name:'美股指数',rows:all.filter(r=>r.section==='股指')},
    {name:'债券与利率',rows:all.filter(r=>r.section==='债券'||r.section==='利率')},
    {name:'外汇',rows:all.filter(r=>r.section==='外汇/加密'&&r.instrument!=='比特币')},
    {name:'加密货币',rows:all.filter(r=>r.instrument==='比特币')},
    {name:'能源',rows:all.filter(r=>r.section==='能源')},
    {name:'贵金属',rows:all.filter(r=>['黄金','白银'].includes(r.instrument))},
    {name:'工业与农产品',rows:all.filter(r=>['铜','玉米'].includes(r.instrument))},
  ].filter(g=>g.rows.length);

  groups.forEach(g=>{
    html+=`<div class="market-section"><h3>${g.name}</h3><div class="card-grid">`;
    g.rows.forEach(r=>{
      const z=r.net_z??0, lz=r.long_z??0, sz=r.short_z??0;
      const crowdedC=(z>=2.75||lz>=2.75)?true:(z<=-2.75||sz>=2.75)?true:(z>=2||lz>=2)?true:(z<=-2||sz>=2)?true:false;
      const isDiverged=r.flow_state&&r.price_chg!=null&&((BULL.has(r.flow_state)&&r.price_chg<-0.05)||(BEAR.has(r.flow_state)&&r.price_chg>0.05));
      const pPos=(z+3)/6*100;
      const sc=BULL.has(r.flow_state)&&z>0?'看多':BEAR.has(r.flow_state)&&z<0?'看空':'中性';
      const scCls='sentiment '+(sc==='看多'?'green':sc==='看空'?'red':'muted');
      const insight=getInsight(r);
      const fl=getFlowLabel(r.flow_state);

      html+=`<div class="instr-card${crowdedC?' crowded':''}${isDiverged?' diverged':''}">`;
      html+=`<div class="top"><div><div class="name">${r.instrument}</div><div class="${scCls}">${sc}</div></div>`;
      html+=`${r.price_chg!=null?'<div class="price '+(r.price_chg>0?'green':r.price_chg<0?'red':'muted')+'">'+(r.price_chg>0?'+':'')+r.price_chg.toFixed(1)+'%</div>':''}</div>`;

      // Gauge
      const gDotPos=Math.max(0,Math.min(100,pPos));
      const gDotCol=z>0.5?'var(--green-text)':z<-0.5?'var(--red-text)':'var(--text-muted)';
      html+=`<div class="gauge"><label>净持仓</label><div class="gauge-track">
        <div class="gauge-bg"></div><div class="gauge-center"></div>
        <div class="gauge-dot" style="left:calc(${gDotPos}% - 5px);background:${gDotCol}"></div></div>
        <div class="gauge-val ${z>0?'green':z<0?'red':'muted'}">${z.toFixed(1)}</div></div>`;

      html+=`<div class="insight">${insight}</div>`;
      html+=`<div class="card-tags">`;
      if(fl) {
        const fc=['资金做多','空头撤退','多头强势挤压'].includes(fl)?'bull':['资金做空','多头撤退','空头强势施压'].includes(fl)?'bear':'neutral';
        html+=`<span class="tag ${fc}">${fl}</span>`;
      }
      if(crowdedC) html+=`<span class="tag crowd">拥挤</span>`;
      if(isDiverged) html+=`<span class="tag diverge">价格背离</span>`;
      html+=`</div></div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function getFlowLabel(f){
  const m={'多头建仓':'资金做多','空头回补':'空头撤退','多头挤压':'多头强势挤压','空头建仓':'资金做空','多头平仓':'多头撤退','空头施压':'空头强势施压','多空双增':'多空分歧加大','多空双减':'多空同时离场'};
  return m[f]||'';
}

function getInsight(r){
  const z=r.net_z??0,ww=r.net_ww,wwz=r.net_ww_z??0;
  if(z>=2.75||r.long_z>=2.75) return '多头仓位处于3年极端水平，注意反转风险';
  if(z<=-2.75||r.short_z>=2.75) return '空头仓位处于3年极端水平，注意反转风险';
  if(r.flow_state&&r.price_chg!=null){
    if(BULL.has(r.flow_state)&&r.price_chg<-0.5) return '资金看多但价格下跌，关注是否为抄底信号';
    if(BEAR.has(r.flow_state)&&r.price_chg>0.5) return '资金看空但价格上涨，警惕获利回吐';
  }
  if(Math.abs(wwz)>=1.5) return '本周净多头'+(ww>0?'大幅增加':'大幅减少')+'，变化幅度为近3年'+Math.abs(wwz).toFixed(1)+'倍标准差';
  if(r.flow_state){const m={'多头建仓':'机构正在积极建立多头仓位','空头回补':'空头正在平仓离场，减轻下行压力','多头挤压':'多头强势进入，空头被迫回补','空头建仓':'机构正在积极建立空头仓位','多头平仓':'多头获利了结，仓位减少','空头施压':'空头强势施压，多头被迫离场','多空双增':'多空分歧加大，波动率可能上升','多空双减':'多空同时减仓，市场观望情绪浓'};if(m[r.flow_state]) return m[r.flow_state];}
  if(Math.abs(z)>=1.5) return z>0?'净多头处于历史较高水平':'净空头处于历史较高水平';
  return '持仓变化温和，无显著异常信号';
}

// ─── AI 分析 ───
async function renderAnalysis(d){
  const el=document.getElementById('panel-analysis');
  if(!d.ai_analysis){el.innerHTML='<div class="empty">🤖 本期暂无 AI 分析观点</div>';return}

  // Load markdown-it
  if(!md){
    try{
      await loadScript('https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js');
      md=window.markdownit({breaks:true,linkify:true});
    }catch(e){el.innerHTML='<div class="error">加载失败</div>';return}
  }

  const html=md.render(d.ai_analysis);
  el.innerHTML=`<div class="analysis-wrap">
    <div class="analysis-header">
      <div><h1>CFTC 持仓深度分析</h1>
        <div class="meta"><span>${d.report_date}</span><span class="badge">AI</span></div></div>
      <div class="analysis-legend">
        <span class="lg bull">看多信号</span><span class="lg bear">看空信号</span><span class="lg risk">风险提示</span>
      </div>
    </div>
    <div class="analysis-content" id="analysisContent">${processAnalysisHtml(html)}</div>
  </div>`;
}

function processAnalysisHtml(h){
  // Apply keyword highlighting
  h=h.replace(/<\/?h1[^>]*>.*?<\/h1>/g,''); // remove h1
  KEYWORDS.forEach(kw=>{
    h=h.replace(kw.p,function(m){
      return '<span class="'+kw.c+'">'+m+'</span>';
    });
  });
  // Enhance bold to use text-primary
  h=h.replace(/<strong>(.*?)<\/strong>/g,'<strong style="color:var(--text-primary)">$1</strong>');
  return h;
}

function loadScript(u){return new Promise((a,b)=>{const s=document.createElement('script');s.src=u;s.onload=a;s.onerror=b;document.head.appendChild(s)})}

// ─── Tab 切换 ───
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
});

// ─── 侧边栏移动端 ───
document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

// ─── 启动 ───
init();
</script>
